repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: uv-lock-sync
        name: sync uv.lock with pyproject.toml
        entry: bash -c 'uv lock --check 2>/dev/null || (uv lock && git add uv.lock)'
        language: system
        files: ^pyproject\.toml$
        pass_filenames: false
